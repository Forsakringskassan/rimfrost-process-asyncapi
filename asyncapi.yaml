asyncapi: 3.0.0
info:
  title: Process - Vård av husdjur Async API
  version: 1.0.0
  description: Initiering av flöde för hantering av Vård av husdjur

channels:
  vah.handlaggning.requests:
    address: vah.handlaggning.requests
    messages:
      VahHandlaggningRequestMessage:
        $ref: "#/components/messages/VahHandlaggningRequestMessage"

  vah.handlaggning.responses:
    address: vah.handlaggning.responses
    messages:
      VahHandlaggningResponseMessage:
        $ref: "#/components/messages/VahHandlaggningResponseMessage"

operations:
  VahHandlaggningRequest:
    action: receive
    summary: Initiering av flöde för hantering av Vård av husdjur
    channel:
      $ref: "#/channels/vah.handlaggning.requests"
    reply:
      address:
        description: Resultatet skickas tillbaka till originator.
        location: "$message.header#/replyTo"
      channel:
        $ref: "#/channels/vah.handlaggning.responses"

components:
  schemas:
    VahHandlaggningRequestMessageHeaders:
      type: object
      properties:
        replyTo:
          type: string
          description: Topic där response ska skickas
        correlationId:
          type: string
          format: uuid
          description: Unikt ID som kopplar ihop request & response

    VahHandlaggningResponseMessageHeaders:
      type: object
      properties:
        correlationId:
          type: string
          description: Unikt ID som kopplar ihop request & response

    VahHandlaggningRequestMessageData:
      type: object
      title: VahHandlaggningRequestMessageData
      required:
        - handlaggningId
      properties:
        handlaggningId:
          type: string
          format: uuid
          description: Unikt ID som identifierar handläggningsärendet

    VahHandlaggningResponseMessageData:
      type: object
      title: VahHandlaggningResponseMessageData
      required:
        - handlaggningId
        - resultat
      properties:
        handlaggningId:
          type: string
          format: uuid
          description: Unikt ID som identifierar handläggningsärendet
        resultat:
          type: string

  messages:
    VahHandlaggningRequestMessage:
      headers:
        $ref: "#/components/schemas/VahHandlaggningRequestMessageHeaders"
      payload:
        title: VahHandlaggningRequestMessagePayload
        allOf:
          - $ref: "kogito-cloudevent.yaml#/components/schemas/KogitoCloudEvent"
          - type: object
            title: VahHandlaggningRequestMessageData
            required:
              - data
            properties:
              data:
                $ref: "#/components/schemas/VahHandlaggningRequestMessageData"

    VahHandlaggningResponseMessage:
      headers:
        $ref: "#/components/schemas/VahHandlaggningResponseMessageHeaders"
      payload:
        title: VahHandlaggningResponseMessagePayload
        allOf:
          - $ref: "kogito-cloudevent.yaml#/components/schemas/KogitoCloudEvent"
          - type: object
            title: VahHandlaggningResponseMessageData
            required:
              - data
            properties:
              data:
                $ref: "#/components/schemas/VahHandlaggningResponseMessageData"
