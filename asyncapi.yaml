asyncapi: 3.0.0
info:
  title: Rimfrost Process Async API
  version: 1.0.0
  description: Initiering av rimfrost processflöde

channels:
  handlaggning.requests:
    address: handlaggning.requests
    messages:
      HandlaggningRequestMessage:
        $ref: "#/components/messages/HandlaggningRequestMessage"

  handlaggning.responses:
    address: handlaggning.responses
    messages:
      HandlaggningResponseMessage:
        $ref: "#/components/messages/HandlaggningResponseMessage"

operations:
  HandlaggningRequest:
    action: receive
    summary: Initiering av processflöde
    channel:
      $ref: "#/channels/handlaggning.requests"
    reply:
      address:
        description: Resultatet skickas tillbaka till originator.
        location: "$message.header#/replyTo"
      channel:
        $ref: "#/channels/handlaggning.responses"

components:
  schemas:
    HandlaggningRequestMessageHeaders:
      type: object
      properties:
        replyTo:
          type: string
          description: Topic där response ska skickas
        correlationId:
          type: string
          format: uuid
          description: Unikt ID som kopplar ihop request & response

    HandlaggningResponseMessageHeaders:
      type: object
      properties:
        correlationId:
          type: string
          description: Unikt ID som kopplar ihop request & response

    HandlaggningRequestMessageData:
      type: object
      title: HandlaggningRequestMessageData
      required:
        - handlaggningId
      properties:
        handlaggningId:
          type: string
          format: uuid
          description: Unikt ID som identifierar handläggningsärendet

    HandlaggningErrorInformation:
      type: object
      title: HandlaggningErrorInformation
      required:
        - felkod
        - felmeddelande
      properties:
        felkod:
          type: string
          description: Maskinsläsbar felkod, t.ex. INTERN_FEL
        felmeddelande:
          type: string
          description: Beskrivning av vad som gick fel

    HandlaggningResponseMessageData:
      type: object
      title: HandlaggningResponseMessageData
      required:
        - handlaggningId
        - resultat
      properties:
        handlaggningId:
          type: string
          format: uuid
          description: Unikt ID som identifierar handläggningsärendet
        resultat:
          type: string
          description: Utfall av handläggningen, t.ex. GODKÄND eller EJ GODKÄND. Vid fel sätts värdet till FEL.
        error:
          $ref: "#/components/schemas/HandlaggningErrorInformation"
          description: Finns endast när ett fel uppstått, annars null
          nullable: true

  messages:
    HandlaggningRequestMessage:
      headers:
        $ref: "#/components/schemas/HandlaggningRequestMessageHeaders"
      payload:
        title: HandlaggningRequestMessagePayload
        allOf:
          - $ref: "kogito-cloudevent.yaml#/components/schemas/KogitoCloudEvent"
          - type: object
            title: HandlaggningRequestMessageData
            required:
              - data
            properties:
              data:
                $ref: "#/components/schemas/HandlaggningRequestMessageData"

    HandlaggningResponseMessage:
      headers:
        $ref: "#/components/schemas/HandlaggningResponseMessageHeaders"
      payload:
        title: HandlaggningResponseMessagePayload
        allOf:
          - $ref: "kogito-cloudevent.yaml#/components/schemas/KogitoCloudEvent"
          - type: object
            title: HandlaggningResponseMessageData
            required:
              - data
            properties:
              data:
                $ref: "#/components/schemas/HandlaggningResponseMessageData"